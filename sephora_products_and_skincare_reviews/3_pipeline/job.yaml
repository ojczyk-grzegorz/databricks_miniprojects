resources:
  pipelines:
    sephora_pipeline:
      name: sephora_pipeline
      libraries:
        - file:
            path: sephora_products_and_skincare_reviews/3_pipeline/transformations/trans.py
      channel: CURRENT
      development: false

  jobs:
    sephora_pipeline_job:
      name: sephora_pipeline_job
      tasks:
        - task_key: pipeline_layer
          pipeline_task:
            pipeline_id: ${resources.pipelines.sephora_pipeline.id}
        - task_key: ai_layer
          depends_on:
            - task_key: pipeline_layer
          notebook_task:
            notebook_path: sephora_products_and_skincare_reviews/3_pipeline/task_ai
            source: GIT
            base_parameters:
              SCHEMA: workspace.sephora_products_and_skincare_reviews
              VECTOR_SEARCH_ENPOINT: sephora
              TABLE_GOLD_PRODUCTS_RECOMMENDATIONS: 3_gold_products_recommendations
              VECTOR_SEARCH_INDEX_NAME: 3_gold_products_recommendations_index
      git_source:
        git_url: https://github.com/ojczyk-grzegorz/databricks_miniprojects
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
